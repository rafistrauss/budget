<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wallet background -->
  <rect x="0" y="25" width="100" height="55" rx="6" fill="#4f86c6"/>
  
  <!-- Wallet flap -->
  <path d="M 0 25 Q 50 8 100 25 L 100 42 Q 50 35 0 42 Z" fill="#3d6aa8"/>
  
  <!-- Dollar sign -->
  <text x="50" y="50" font-size="50" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif">$</text>
  
  <!-- Shine effect -->
  <ellipse cx="22" cy="30" rx="10" ry="8" fill="#ffffff" opacity="0.3"/>
</svg>