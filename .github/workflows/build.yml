permissions:
  contents: write
  pages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - released
      - created
      - published
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Deploy-Github-Pages:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: pnpm/action-setup@v4.0.0
        with:
          run_install: true
      - run: pnpm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}
      - name: Deploy
        run: |
          set -euo pipefail
          SITE_DIR="$(mktemp -d)"
          cp -R build/. "${SITE_DIR}/"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages:gh-pages
            git switch gh-pages
          else
            git switch --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p pr-preview
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name pr-preview -exec rm -rf {} +
          rsync -a "${SITE_DIR}/" ./
          touch .nojekyll

          git add -A

          if git diff --cached --quiet; then
            echo "No production site changes to deploy."
            exit 0
          fi

          git commit -m "Deploy site for ${GITHUB_SHA}"
          git push origin HEAD:gh-pages

  Deploy-PR-Preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: pr-${{ github.event.pull_request.number }}
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: pnpm/action-setup@v4.0.0
        with:
          run_install: true
      - run: pnpm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}
      - name: Deploy preview
        env:
          PREVIEW_DIR: pr-preview/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          SITE_DIR="$(mktemp -d)"
          cp -R build/. "${SITE_DIR}/"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages:gh-pages
            git switch gh-pages
          else
            git switch --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf "${PREVIEW_DIR}"
          mkdir -p "${PREVIEW_DIR}"
          rsync -a "${SITE_DIR}/" "${PREVIEW_DIR}/"
          touch .nojekyll

          git add -A

          if git diff --cached --quiet; then
            echo "No preview site changes to deploy."
            exit 0
          fi

          git commit -m "Deploy preview for PR #${{ github.event.pull_request.number }}"
          git push origin HEAD:gh-pages

  Remove-PR-Preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove preview
        env:
          PREVIEW_DIR: pr-preview/pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if ! git ls-remote --exit-code --heads origin gh-pages; then
            echo "gh-pages branch does not exist; nothing to clean up."
            exit 0
          fi

          git fetch origin gh-pages:gh-pages
          git switch gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf "${PREVIEW_DIR}"
          if [ -d pr-preview ] && [ -z "$(ls -A pr-preview)" ]; then
            rmdir pr-preview
          fi

          git add -A

          if git diff --cached --quiet; then
            echo "No preview site changes to remove."
            exit 0
          fi

          git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
          git push origin HEAD:gh-pages
